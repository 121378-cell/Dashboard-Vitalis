# fly.toml - Configuración de Fly.io para el Backend de Atlas Vitalis
app = "atlas-vitalis-backend"
primary_region = "ams" # Datacenter en Amsterdam (donde está el volumen atlas_data)

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8080"
PYTHONUNBUFFERED = "1"
LOG_LEVEL = "INFO"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[http_service.concurrency]
type = "connections"
hard_limit = 25
soft_limit = 20

[[mounts]]
source = "atlas_data"
destination = "/data"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1

[checks]
[checks.health]
grace_period = "30s"
interval = "15s"
method = "get"
path = "/health"
timeout = "10s"
